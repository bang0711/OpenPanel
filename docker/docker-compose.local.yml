# Local-only overlay for testing the real container stack on your machine.
# Adds a Postgres so you don't need an external database, and wires migrate +
# server to wait for it. NOT used in production: it loads only because the
# gitignored docker/.env sets COMPOSE_FILE to include it. On the server no .env
# exists, so this file is never read.
#
#   cd docker && docker compose up        # .env selects both files via COMPOSE_FILE
#
# DATABASE_URL in docker/.env points at this `db` service (db:5432).

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: openpanel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local}
      POSTGRES_DB: open_panel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openpanel -d open_panel"]
      interval: 3s
      timeout: 5s
      retries: 10
    ports:
      # Exposed so you can inspect it with psql from the host if you want.
      - "5432:5432"
    restart: unless-stopped

  # Merged into the base file's definitions — compose adds these depends_on
  # edges, it does not replace what is already there. pull_policy: never keeps
  # `up` from reaching Docker Hub for the locally-built image (which is not
  # published under this bare name).
  migrate:
    pull_policy: never
    depends_on:
      db:
        condition: service_healthy

  server:
    pull_policy: never
    depends_on:
      db:
        condition: service_healthy

  web:
    pull_policy: never

volumes:
  pgdata:
