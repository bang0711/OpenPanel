# OpenPanel — generated by `open-panel install`. Safe to edit.
# Settings live in .env next to this file. One image runs every role.
#
#   docker compose up -d
#   docker compose run --rm server seed    # first admin user
#   docker compose logs -f server
#
# Bring your own database: set DATABASE_URL in .env to a reachable Postgres
# (managed or self-hosted). This stack does not run one.

services:
  # Applies migrations, then exits. `server` waits for it to succeed, so the
  # API never races an unmigrated schema.
  migrate:
    image: ${IMAGE:-open-panel:1.1.1}
    command: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:?required (injected by CI, or set in .env for a manual install)}
    restart: "no"

  server:
    image: ${IMAGE:-open-panel:1.1.1}
    command: server
    environment:
      DATABASE_URL: ${DATABASE_URL:?required (injected by CI, or set in .env for a manual install)}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?required (injected by CI, or set in .env for a manual install)}
      OPENPANEL_ENC_KEY: ${OPENPANEL_ENC_KEY:?required (injected by CI, or set in .env for a manual install)}
      PORT: "3001"
      # Browser-facing web origin: scopes the auth cookie, builds redirect URLs,
      # gates CORS. It is the WEB url, not this server's port.
      WEB_ORIGIN: ${PUBLIC_URL:-http://localhost:3000}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      # The browser opens the terminal websocket against this port directly.
      - "3001:3001"
    # Proves the API is actually serving AND its DB is reachable — not just that
    # the container started. `bun` ships in the image, so no curl/wget needed;
    # it also fails correctly on a 503 (busybox wget would not).
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r=await fetch('http://localhost:3001/api/health');process.exit(r.ok?0:1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    image: ${IMAGE:-open-panel:1.1.1}
    command: web
    environment:
      # Server-side reach to the API over the compose network (proxy.ts + RSC).
      API_BASE_URL: http://server:3001
      # Read server-side and passed to the client, so it is not baked into the
      # bundle. Must be reachable from the browser.
      TERMINAL_WS_URL: ${PUBLIC_WS_URL:-ws://localhost:3001/api/terminal}
    depends_on:
      # Wait for the API to be healthy, not just started — the web app proxies
      # /api/* to it, so a not-yet-ready server means broken first requests.
      server:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r=await fetch('http://localhost:3000/login');process.exit(r.ok?0:1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
