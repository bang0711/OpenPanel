# OpenPanel — generated by `open-panel install`. Safe to edit.
# Settings live in .env next to this file. One image runs every role.
#
#   docker compose up -d
#   docker compose run --rm server seed    # first admin user
#   docker compose logs -f server

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: openpanel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: open_panel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openpanel -d open_panel"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Not published to the host: only other containers reach it at db:5432.

  # Applies migrations, then exits. `server` waits for it to succeed, so the
  # API never races an unmigrated schema.
  migrate:
    image: ${IMAGE:-open-panel:0.1.0}
    command: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL:?set in .env}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  server:
    image: ${IMAGE:-open-panel:0.1.0}
    command: server
    environment:
      DATABASE_URL: ${DATABASE_URL:?set in .env}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set in .env}
      OPENPANEL_ENC_KEY: ${OPENPANEL_ENC_KEY:?set in .env}
      PORT: "3001"
      # Browser-facing web origin: scopes the auth cookie, builds redirect URLs,
      # gates CORS. It is the WEB url, not this server's port.
      WEB_ORIGIN: ${PUBLIC_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      # The browser opens the terminal websocket against this port directly.
      - "3001:3001"
    restart: unless-stopped

  web:
    image: ${IMAGE:-open-panel:0.1.0}
    command: web
    environment:
      # Server-side reach to the API over the compose network (proxy.ts + RSC).
      API_BASE_URL: http://server:3001
      # Read server-side and passed to the client, so it is not baked into the
      # bundle. Must be reachable from the browser.
      TERMINAL_WS_URL: ${PUBLIC_WS_URL:-ws://localhost:3001/api/terminal}
    depends_on:
      - server
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
