name: Release

# Tag-driven: `bun run update 1.0.0` -> commit -> `git tag v1.0.0` -> push.
# `bun run release` does the same locally; this is the CI path.
on:
  push:
    tags: ["v*"]

# Least privilege by default; the deploy job scopes its own secrets via its
# `environment`. No job here needs write access to the repo.
permissions:
  contents: read

# Serialize releases: two tags pushed close together must not build/push/deploy
# concurrently and race the box. cancel-in-progress is false — never kill a
# release that may be mid-deploy.
concurrency:
  group: release
  cancel-in-progress: false

# Pinned so a fresh Bun release can't change what the gate runs.
env:
  BUN_VERSION: "1.3.14"

jobs:
  test:
    name: gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run db:generate
      - run: bun run test

  publish:
    name: build + push
    # Gates first: nothing reaches Docker Hub unless the tests pass.
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Derive version from the tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # The tag is the source of truth for the image tag; fail loudly rather
      # than publish an image whose package.json says something else.
      - name: Check tag matches package.json
        run: |
          pkg=$(node -p "require('./package.json').version")
          if [ "$pkg" != "${{ steps.version.outputs.version }}" ]; then
            echo "tag v${{ steps.version.outputs.version }} != package.json $pkg" >&2
            echo "run: bun run update ${{ steps.version.outputs.version }}" >&2
            exit 1
          fi

      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/open-panel:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/open-panel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy
    # Only ever deploys an image that is already published and gated.
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Scopes the deploy credentials to this environment, so a protection rule
    # (required reviewer, branch filter) can gate it later without a rewrite.
    environment: production
    steps:
      - uses: actions/checkout@v7

      # No third-party SSH action: `ssh` is already on the runner, and an
      # action here would be a supply-chain dependency holding a key with
      # docker (root-equivalent) rights on the production box.
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/open-panel:${{ needs.publish.outputs.version }}
          # The deployed host keeps no .env — every value is injected here and
          # travels over the ssh channel. OPENPANEL_ENC_KEY decrypts stored SSH
          # credentials, so it MUST stay constant across releases; never rotate it
          # or every registered server is orphaned.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          OPENPANEL_ENC_KEY: ${{ secrets.OPENPANEL_ENC_KEY }}
          # Public URLs (repo variables, not secrets). Default to localhost.
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
          PUBLIC_WS_URL: ${{ vars.PUBLIC_WS_URL }}
          # Reverse-proxy (Traefik) integration — all optional. Leave COMPOSE_FILE
          # unset to publish ports directly; set it to
          # "docker-compose.yml:docker-compose.traefik.yml" plus PANEL_HOST +
          # TRAEFIK_NETWORK to route through an existing Traefik instead.
          COMPOSE_FILE: ${{ vars.COMPOSE_FILE }}
          PANEL_HOST: ${{ vars.PANEL_HOST }}
          TRAEFIK_NETWORK: ${{ vars.TRAEFIK_NETWORK }}
          TRAEFIK_ENTRYPOINT: ${{ vars.TRAEFIK_ENTRYPOINT }}
          TRAEFIK_CERTRESOLVER: ${{ vars.TRAEFIK_CERTRESOLVER }}
        run: |
          set -euo pipefail
          : "${DEPLOY_PATH:?set the DEPLOY_PATH repository variable, e.g. /opt/openpanel}"

          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Host key comes from a secret (`ssh-keyscan <host>`), never a scan at
          # deploy time: a scan trusts whoever answers first, and this hop hands
          # over a key to the panel's own host. StrictHostKeyChecking=yes turns a
          # MITM into a failed deploy instead of a compromised one.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          ssh_opts="-i $HOME/.ssh/id_deploy -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o IdentitiesOnly=yes"

          # The compose file + remote script are not secret; copy them into place.
          # (deploy.sh is invoked by path, so it must land before the ssh call.)
          ssh $ssh_opts "$SSH_USER@$HOST" "mkdir -p '$DEPLOY_PATH'"
          # Both compose files ship; COMPOSE_FILE decides which are used. The
          # traefik overlay is inert unless COMPOSE_FILE names it.
          scp $ssh_opts docker/docker-compose.yml docker/docker-compose.traefik.yml docker/deploy.sh \
              "$SSH_USER@$HOST:$DEPLOY_PATH/"

          # Pipe config as KEY=value lines over stdin (the ssh channel): secrets
          # never touch the server's disk and never appear in its `ps`. `printf
          # '%s\n'` keeps values with '%' or '=' intact (e.g. DATABASE_URL query
          # strings). Values are builtins' args on the runner, not exec'd argv.
          {
            printf '%s\n' "IMAGE=$IMAGE"
            printf '%s\n' "DATABASE_URL=$DATABASE_URL"
            printf '%s\n' "BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET"
            printf '%s\n' "OPENPANEL_ENC_KEY=$OPENPANEL_ENC_KEY"
            printf '%s\n' "PUBLIC_URL=${PUBLIC_URL:-http://localhost:3000}"
            printf '%s\n' "PUBLIC_WS_URL=${PUBLIC_WS_URL:-ws://localhost:3001/api/terminal}"
            # Defaults to the base compose only; the traefik values are read by
            # docker-compose.traefik.yml when COMPOSE_FILE names it.
            printf '%s\n' "COMPOSE_FILE=${COMPOSE_FILE:-docker-compose.yml}"
            printf '%s\n' "PANEL_HOST=${PANEL_HOST:-}"
            printf '%s\n' "TRAEFIK_NETWORK=${TRAEFIK_NETWORK:-}"
            printf '%s\n' "TRAEFIK_ENTRYPOINT=${TRAEFIK_ENTRYPOINT:-websecure}"
            printf '%s\n' "TRAEFIK_CERTRESOLVER=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
          } | ssh $ssh_opts "$SSH_USER@$HOST" "sh '$DEPLOY_PATH/deploy.sh' '$DEPLOY_PATH'"
